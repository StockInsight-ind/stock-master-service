# .github/workflows/initial-import.yml
# ONE-TIME full import. Run manually from GitHub Actions UI.

name: Initial Stock Import (Run Once)

on:
  workflow_dispatch:

jobs:
  initial-import:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Full Import — India
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY:           ${{ secrets.FINNHUB_API_KEY }}
        run: |
          deno run --allow-net --allow-env - <<'EOF'
          import { importIndiaStocks } from "./scripts/importStocks.ts";
          await importIndiaStocks();
          EOF

      - name: Full Import — USA
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY:           ${{ secrets.FINNHUB_API_KEY }}
        run: |
          deno run --allow-net --allow-env - <<'EOF'
          import { importUSAStocks } from "./scripts/importStocks.ts";
          await importUSAStocks();
          EOF

      - name: Full Import — Australia
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY:           ${{ secrets.FINNHUB_API_KEY }}
        run: |
          deno run --allow-net --allow-env - <<'EOF'
          import { importAustraliaStocks } from "./scripts/importStocks.ts";
          await importAustraliaStocks();
          EOF
